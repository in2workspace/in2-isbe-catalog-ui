<div class="flex flex-col md:grid md:grid-cols-2 gap-5 mt-8">
  @if (nameControl) {
    <div class="flex flex-col">
      <label for="prod-name" class="font-semibold text-base text-primary-100">{{ 'CREATE_OFFER._name' | translate }}</label>
      <input data-cy="offerName" id="prod-name" type="text" [formControl]="nameControl" maxLength="100"
            class="md:mb-4 bg-white border-gray-50 text-gray-100 text-sm rounded-lg focus:ring-black focus:border-black block w-full px-4 py-2"/>
    </div>
  }
  @if (versionControl) {
    <div class="flex flex-col">
      <label for="prod-version" class="font-semibold text-base text-primary-100">{{ 'CREATE_OFFER._version' | translate }}</label>
      <input data-cy="offerVersion" id="prod-version" type="text" [formControl]="versionControl"
            class="mb-5 md:mb-4 bg-white border-gray-50 text-gray-100 text-sm rounded-lg focus:ring-black focus:border-black block w-full px-4 py-2"/>
    </div>
  }
</div>

@if (statusControl && formType === 'update') {
  <label class="font-semibold text-base col-span-2 text-primary-100">{{ 'CREATE_OFFER._status' | translate }}</label>
  <app-status-selector [modelType]="'offering'" [allowLaunched]="isAdmin" [anchor]="statusAnchor" [formControl]="statusControl"></app-status-selector>

}
@if (descControl) {
  <label class="font-semibold text-base col-span-2 text-primary-100">{{ 'CREATE_OFFER._description' | translate }}</label>
  <app-markdown-textarea [formControl]="descControl"></app-markdown-textarea>
}
