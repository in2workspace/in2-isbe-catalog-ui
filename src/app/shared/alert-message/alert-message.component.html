<div id="alert-additional-content-2" class="p-4 mb-4 text-yellow-800 border border-yellow-300 rounded-lg bg-yellow-50   " role="alert">
    <div class="flex items-center">
      <svg class="flex-shrink-0 w-4 h-4 me-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
      </svg>
    </div>
    <div class="mt-2 mb-4 text-sm">      
      {{ translationKey | translate }}
    </div>

    @if(showActions){
      <div class="mt-4 flex justify-end gap-2">
      <button
        type="button"
        (click)="onCancel()"
        class="px-3 py-1.5 text-sm rounded-lg border border-gray-300 bg-white text-gray-700 hover:bg-gray-100    "
      >
        {{ 'CREATE_PROD_SPEC._cancel' | translate }}
      </button>

      <button
        type="button"
        (click)="onAccept()"
        class="px-3 py-1.5 text-sm rounded-lg bg-red-600 text-white hover:bg-red-700"
      >
        {{ 'CREATE_PROD_SPEC._aceptar' | translate }}
      </button>
    </div>
    }
    
</div>
