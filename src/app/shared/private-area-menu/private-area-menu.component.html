<div class="bg-white/20 sticky top-[160px] w-full h-fit text-sm font-medium rounded-lg bg-black p-2.5 text-white" [ngClass]="{
    'bg-white/20': variant === 'header'
  }">

  <!-- PERFIL -->
  <div class="rounded-lg" [ngClass]="{ 'bg-white/20': isGroupActive('profile') && variant === 'sidebar' }">
    <button (click)="onSelect(loggedAsUser ? 'account' : 'org')" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg mb-1"
      [ngClass]="{ 'text-green': isGroupActive('profile') }">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.023 17.2923C6.873 16.6616 7.799 16.1635 8.801 15.798C9.80283 15.4327 10.8692 15.25 12 15.25C13.1308 15.25 14.1972 15.4327 15.199 15.798C16.201 16.1635 17.127 16.6616 17.977 17.2923C18.5987 16.6089 19.0912 15.8179 19.4548 14.9192C19.8183 14.0206 20 13.0475 20 12C20 9.78333 19.2208 7.89583 17.6625 6.3375C16.1042 4.77917 14.2167 4 12 4C9.78333 4 7.89583 4.77917 6.3375 6.3375C4.77917 7.89583 4 9.78333 4 12C4 13.0475 4.18175 14.0206 4.54525 14.9192C4.90875 15.8179 5.40133 16.6089 6.023 17.2923ZM12.0003 12.75C11.0873 12.75 10.3173 12.4367 9.6905 11.81C9.0635 11.1832 8.75 10.4133 8.75 9.50025C8.75 8.58725 9.06333 7.81733 9.69 7.1905C10.3168 6.5635 11.0868 6.25 11.9998 6.25C12.9128 6.25 13.6827 6.56333 14.3095 7.19C14.9365 7.81683 15.25 8.58675 15.25 9.49975C15.25 10.4127 14.9367 11.1827 14.31 11.8095C13.6832 12.4365 12.9132 12.75 12.0003 12.75ZM12 21.5C10.6808 21.5 9.44333 21.2519 8.2875 20.7558C7.13167 20.2596 6.12625 19.5839 5.27125 18.7288C4.41608 17.8738 3.74042 16.8683 3.24425 15.7125C2.74808 14.5567 2.5 13.3192 2.5 12C2.5 10.6808 2.74808 9.44333 3.24425 8.2875C3.74042 7.13167 4.41608 6.12625 5.27125 5.27125C6.12625 4.41608 7.13167 3.74042 8.2875 3.24425C9.44333 2.74808 10.6808 2.5 12 2.5C13.3192 2.5 14.5567 2.74808 15.7125 3.24425C16.8683 3.74042 17.8738 4.41608 18.7288 5.27125C19.5839 6.12625 20.2596 7.13167 20.7558 8.2875C21.2519 9.44333 21.5 10.6808 21.5 12C21.5 13.3192 21.2519 14.5567 20.7558 15.7125C20.2596 16.8683 19.5839 17.8738 18.7288 18.7288C17.8738 19.5839 16.8683 20.2596 15.7125 20.7558C14.5567 21.2519 13.3192 21.5 12 21.5ZM12 20C12.9025 20 13.7727 19.8548 14.6105 19.5645C15.4483 19.274 16.1923 18.8679 16.8422 18.3462C16.1923 17.8436 15.458 17.4519 14.6395 17.1712C13.8208 16.8904 12.941 16.75 12 16.75C11.059 16.75 10.1776 16.8888 9.35575 17.1663C8.53392 17.4439 7.80125 17.8372 7.15775 18.3462C7.80775 18.8679 8.55167 19.274 9.3895 19.5645C10.2273 19.8548 11.0975 20 12 20ZM12 11.25C12.4975 11.25 12.9135 11.0827 13.248 10.748C13.5827 10.4135 13.75 9.9975 13.75 9.5C13.75 9.0025 13.5827 8.5865 13.248 8.252C12.9135 7.91733 12.4975 7.75 12 7.75C11.5025 7.75 11.0865 7.91733 10.752 8.252C10.4173 8.5865 10.25 9.0025 10.25 9.5C10.25 9.9975 10.4173 10.4135 10.752 10.748C11.0865 11.0827 11.5025 11.25 12 11.25Z" fill="currentColor"/>
      </svg>
      {{ 'PROFILE._profile' | translate }}
    </button>
    @if (variant === 'header' || isGroupActive('profile')) {
      @if (loggedAsUser) {
      <button type="button" class="flex w-full pl-14 pr-4 py-2 rounded-lg"
        [ngClass]="{ 'text-green': active === 'account' }" (click)="onSelect('account')">
        {{ 'PROFILE._general' | translate }}
      </button>
      } @else {
      <button type="button" class="flex w-full pl-14 pr-4 py-2" [ngClass]="{ 'text-green': active === 'org' }"
        (click)="onSelect('org')">
        {{ 'PROFILE._organization' | translate }}
      </button>

      <button type="button" class="flex w-full pl-14 pr-4 py-2" [ngClass]="{ 'text-green': active === 'account' }"
        (click)="onSelect('account')">
        {{ 'PROFILE._account' | translate }}
      </button>
      }
    }
  </div> 

  <!-- MIS SERVICIOS -->
  @if (roles.includes('seller')) {
    <div class="rounded-lg" [ngClass]="{ 'bg-white/20': isGroupActive('services') && variant === 'sidebar' }">
      <button (click)="onSelect('productspec')" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg mt-3 mb-1"
        [ngClass]="{ ' text-green': isGroupActive('services') }">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M2 2h2v2H2V2Zm5 0h2v2H7V2Zm5 0h2v2h-2V2ZM2 7h2v2H2V7Zm5 0h2v2H7V7Zm5 0h2v2h-2V7ZM2 12h2v2H2v-2Zm5 0h2v2H7v-2Zm5 0h2v2h-2v-2Z"
            fill="currentColor" />
        </svg>
        {{ 'OFFERINGS._my_offerings' | translate }}
      </button>

      @if (variant === 'header' || isGroupActive('services')) {
        <button (click)="onSelect('offers')" class="flex w-full pl-14 pr-4 py-2 cursor-pointer text-left"
          [ngClass]="{ 'text-green': active === 'offers' }">
          {{ 'OFFERINGS._offers' | translate }}
        </button>

        <button (click)="onSelect('productspec')" class="flex w-full pl-14 pr-4 py-2 cursor-pointer text-left"
          [ngClass]="{ 'text-green': active === 'productspec' }">
          {{ 'OFFERINGS._prod_spec' | translate }}
        </button>
      }
    </div>
  }


  <!-- ADMIN -->
  @if (isAdmin) {
    <div class="rounded-lg" [ngClass]="{ 'bg-white/20': isGroupActive('admin') && variant === 'sidebar' }">
      <button (click)="onSelect('categories')" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg mt-3 mb-1 text-left"
        [ngClass]="{ 'text-green': isGroupActive('admin') }">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.25 19.5701V12.4316L5 8.81233V15.7778C5 15.829 5.01283 15.8771 5.0385 15.9221C5.06417 15.9669 5.10258 16.0053 5.15375 16.0373L11.25 19.5701ZM12.75 19.5701L18.8462 16.0373C18.8974 16.0053 18.9358 15.9669 18.9615 15.9221C18.9872 15.8771 19 15.829 19 15.7778V8.81233L12.75 12.4316V19.5701ZM12 11.1393L18.175 7.57008L12.1538 4.08733C12.1026 4.05533 12.0513 4.03933 12 4.03933C11.9487 4.03933 11.8974 4.05533 11.8463 4.08733L5.825 7.57008L12 11.1393ZM4.404 17.3546C4.11933 17.1906 3.8975 16.9714 3.7385 16.6971C3.5795 16.4226 3.5 16.1212 3.5 15.7931V8.20858C3.5 7.88041 3.5795 7.57908 3.7385 7.30458C3.8975 7.03025 4.11933 6.81108 4.404 6.64708L11.0963 2.79508C11.3808 2.63091 11.682 2.54883 12 2.54883C12.318 2.54883 12.6193 2.63091 12.9038 2.79508L19.596 6.64708C19.8807 6.81108 20.1025 7.03025 20.2615 7.30458C20.4205 7.57908 20.5 7.88041 20.5 8.20858V15.7931C20.5 16.1212 20.4205 16.4226 20.2615 16.6971C20.1025 16.9714 19.8807 17.1906 19.596 17.3546L12.9038 21.2066C12.6193 21.3707 12.318 21.4528 12 21.4528C11.682 21.4528 11.3808 21.3707 11.0963 21.2066L4.404 17.3546Z" fill="currentColor"/>
        </svg>

        {{ 'ADMIN._admin' | translate }}
      </button>

      @if (variant === 'header' || isGroupActive('admin')) {
        <button (click)="onSelect('categories')" class="flex w-full pl-14 pr-4 py-2 cursor-pointer"
          [ngClass]="{ 'text-green': active === 'categories' }">
          {{ 'ADMIN._categories' | translate }}
        </button>
      }
    </div>
  }

</div>
